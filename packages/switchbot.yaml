# SwitchBot devices are auto-discovered via the built-in SwitchBot integration.
# Configure in: Settings → Integrations → SwitchBot
# Entity IDs follow the pattern: switch.<location>_<device>
#
# Example entity IDs — update to match what HA assigns after discovery:
#   switch.living_room_main_light
#   switch.bedroom_lamp
#   switch.living_room_tv_power
#   sensor.living_room_temperature
#   sensor.living_room_humidity
